- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.gitconfig:
    ~/.gitignore_global:
    ~/.inputrc:
    ~/.tmux.conf:
    ~/.vim:
    ~/.vimrc:
    ~/.zshrc:
    ~/.zsh:
    ~/bin/:
      glob: true
      path: bin/*
      create: true
    '~/Library/Application Support/Code/User/settings.json':
      if: '[ `uname` = Darwin ]'
      path: vscode/settings.json

- shell:
  - [git submodule update --init --recursive, Installing submodules]
  - [command -v brew >/dev/null && brew bundle, Installing brew packages]
